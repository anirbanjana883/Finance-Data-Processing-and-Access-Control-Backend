openapi: 3.0.0
info:
  title: Finance Dashboard API
  description: API documentation for the Personal Finance Dashboard backend.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local Development Server

# This tells Swagger we use Bearer Tokens!
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Auth
    description: Authentication and User Onboarding
  - name: Users
    description: Admin User Management
  - name: Transactions
    description: Financial Records CRUD

paths:
  # -------------------------
  # AUTHENTICATION ROUTES
  # -------------------------
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Anirban
                email:
                  type: string
                  example: admin@example.com
                password:
                  type: string
                  example: mysecurepassword123
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Missing required fields
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: admin@example.com
                password:
                  type: string
                  example: mysecurepassword123
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current logged-in user profile
      security:
        - bearerAuth: [] # This puts the padlock icon on this route!
      responses:
        '200':
          description: Profile retrieved
        '401':
          description: Unauthorized request